name: Build and Deploy Extension

on:
  push:
    branches:
      - main
    paths:
      - "BollyZoneProvider/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build extension
        run: ./gradlew BollyZoneProvider:make

      - name: Generate plugins.json
        run: |
          FILESIZE=$(wc -c < BollyZoneProvider/build/BollyZoneProvider.cs3)
          echo "[
            {
              \"name\": \"BollyZone\",
              \"internalName\": \"BollyZoneProvider\",
              \"url\": \"https://raw.githubusercontent.com/SiddharthJoshi1/cs3_bollyzone/builds/BollyZoneProvider.cs3\",
              \"version\": 1,
              \"apiVersion\": 1,
              \"repositoryUrl\": \"https://github.com/SiddharthJoshi1/cs3_bollyzone\",
              \"fileSize\": $FILESIZE,
              \"description\": \"Watch Indian TV Shows and Hindi Dramas from BollyZone\",
              \"status\": 1,
              \"language\": \"hi\",
              \"authors\": [\"SiddharthJoshi1\"],
              \"tvTypes\": [\"TvSeries\"],
              \"iconUrl\": \"https://www.bollyzone.to/wp-content/uploads/2021/10/bollyzone-logo.png\"
            }
          ]" > BollyZoneProvider/build/plugins.json

      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: BollyZoneProvider/build
          clean: false

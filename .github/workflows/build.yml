name: Build and Deploy Extension

on:
  push:
    branches:
      - main
    paths:
      - "BollyZoneProvider/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build extension
        run: ./gradlew BollyZoneProvider:make

      - name: Generate plugins.json
        run: |
          echo '[
            {
              "name": "BollyZone",
              "pluginId": "com.bollyzone",
              "version": 1,
              "url": "https://raw.githubusercontent.com/SiddharthJoshi1/cs3_bollyzone/builds/BollyZoneProvider.cs3",
              "description": "Watch Indian TV Shows and Hindi Dramas from BollyZone",
              "status": 0,
              "language": "hi",
              "iconUrl": "https://www.bollyzone.to/wp-content/uploads/2021/10/bollyzone-logo.png"
            }
          ]' > BollyZoneProvider/build/plugins.json

      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: BollyZoneProvider/build
          clean: false
